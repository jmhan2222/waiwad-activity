<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>제주항공 객실서비스 토의 활동</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== 조 선택 화면 ===== -->
  <div id="screen-group-select" class="screen active">
    <header class="main-header">
      <div class="logo-area">
        <div class="logo-icon">✈</div>
        <div class="logo-text">
          <span class="brand">JEJU AIR</span>
          <span class="brand-sub">객실서비스 교육</span>
        </div>
      </div>
      <div class="header-badge">조별 토의 활동</div>
    </header>
    <main class="select-main">
      <h2 class="select-title">우리 조를 선택하세요</h2>
      <p class="select-desc">조별 대표 1인이 선택 후 진행해 주세요</p>
      <div id="group-buttons" class="group-grid"></div>
    </main>
    <div class="facilitator-entry">
      <button id="btn-go-facilitator" class="btn-facilitator-link">진행자 화면 →</button>
    </div>
  </div>

  <!-- ===== 활동 화면 ===== -->
  <div id="screen-activity" class="screen">
    <header class="activity-header">
      <div class="activity-top-row">
        <button id="btn-back-to-groups" class="btn-icon-back">‹</button>
        <span id="activity-group-label" class="activity-group-label">1조</span>
      </div>
      <div class="case-tabs" id="case-tabs">
        <button class="case-tab" data-case="A">Case A</button>
        <button class="case-tab" data-case="B">Case B</button>
        <button class="case-tab" data-case="C">Case C</button>
      </div>
    </header>
    <main id="activity-main" class="activity-main"></main>
  </div>

  <!-- ===== 진행자 로그인 화면 ===== -->
  <div id="screen-facilitator-login" class="screen">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">✈</div>
        <h2>진행자 화면</h2>
        <p>비밀번호를 입력하세요</p>
        <input type="password" id="facilitator-pw-input" class="pw-input" placeholder="● ● ● ●" maxlength="10">
        <p id="pw-error" class="pw-error hidden">비밀번호가 올바르지 않습니다</p>
        <button id="btn-pw-confirm" class="btn-primary full-width">확인</button>
        <button id="btn-pw-back" class="btn-ghost full-width" style="margin-top:8px">뒤로가기</button>
      </div>
    </div>
  </div>

  <!-- ===== 진행자 화면 ===== -->
  <div id="screen-facilitator" class="screen facilitator-screen">
    <header class="facilitator-header">
      <span class="facilitator-title">진행자 화면</span>
      <button id="btn-facilitator-exit" class="btn-exit">나가기</button>
    </header>

    <div class="facilitator-scroll">
      <section class="f-section group-count-section">
        <div class="f-section-label">오늘 교육 조 수 설정</div>
        <div id="group-count-buttons" class="count-btn-group">
          <button class="count-btn" data-count="1">1조</button>
          <button class="count-btn" data-count="2">2조</button>
          <button class="count-btn" data-count="3">3조</button>
          <button class="count-btn" data-count="4">4조</button>
          <button class="count-btn" data-count="5">5조</button>
        </div>
        <p id="group-count-display" class="count-display"></p>
      </section>

      <section class="f-section filter-section">
        <div class="f-section-label">케이스 필터</div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">전체</button>
          <button class="filter-btn" data-filter="A">Case A</button>
          <button class="filter-btn" data-filter="B">Case B</button>
          <button class="filter-btn" data-filter="C">Case C</button>
        </div>
      </section>

      <div id="facilitator-cards" class="facilitator-cards"></div>

      <div class="facilitator-bottom">
        <p id="refresh-countdown" class="refresh-text">30초 후 자동 새로고침</p>
        <button id="btn-manual-refresh" class="btn-ghost full-width">지금 새로고침</button>
        <button id="btn-reset-all" class="btn-danger full-width">전체 초기화</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="main.js"></script>
</body>
</html>
